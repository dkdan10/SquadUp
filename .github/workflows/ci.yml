name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: SquadUp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/SquadUp_test
      # Rails 5.2 + Ruby 3.1 has a kwargs bug in EncryptedFile::MissingKeyError.
      # Providing any value for RAILS_MASTER_KEY makes the railtie skip the
      # missing-key code path. Credentials are not actually used by the app
      # (all secrets read from ENV), so the value is irrelevant.
      RAILS_MASTER_KEY: ci0123456789abcdef0123456789abcdef
      # Spring is dev-convenience and adds a layer that obscures stack traces
      # in CI failures. Disabling it makes errors point at real frames.
      DISABLE_SPRING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1.6
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 10.13.0
          cache: npm

      - name: Install JS deps
        run: npm install --no-audit --no-fund

      - name: Build webpack bundle
        run: npm run webpack

      - name: Prepare database
        run: bundle exec rails db:test:prepare --trace

      - name: Run tests
        run: bundle exec rails test
